name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- SONARQUBE ----------------
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ---------------- DOCKER LOGIN ----------------
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ---------------- BUILD IMAGES ----------------
      - name: Build Go Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/go-service:v1 ./go-service

      - name: Build Python Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/python-service:v1 ./python-service

      - name: Build Node Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-service:v1 ./node-service

      # ---------------- PUSH IMAGES ----------------
      - name: Push Go Service
        run: docker push ${{ secrets.DOCKER_USERNAME }}/go-service:v1

      - name: Push Python Service
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-service:v1

      - name: Push Node Service
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-service:v1

      # ---------------- DEPLOY TO K8S ----------------
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/go/
          kubectl apply -f k8s/python/
          kubectl apply -f k8s/node/
          kubectl apply -f k8s/ingress.yaml
