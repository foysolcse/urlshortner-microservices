apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service
  namespace: urlshortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-service
  template:
    metadata:
      labels:
        app: go-service
    spec:
      containers:
        - name: go-service
          image: foysolcse/go-service:v1
          ports:
            - containerPort: 8000
