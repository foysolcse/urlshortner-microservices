apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-service
  namespace: urlshortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-service
  template:
    metadata:
      labels:
        app: python-service
    spec:
      containers:
        - name: python-service
          image: foysolcse/python-service:v1
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
