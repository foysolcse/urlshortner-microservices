# SonarQube / SonarCloud Configuration
# URL Shortener Microservices - Module 17 Capstone

sonar.projectKey=urlshortener-microservices
sonar.host.url=https://sonarcloud.io
sonar.projectName=URL Shortener Microservices
sonar.projectVersion=1.0

# Organization (SonarCloud only - remove for self-hosted)
sonar.organization=foysolcse

# Source directories for all three services
sonar.sources=go-service,python-service,node-service

# Exclusions - skip vendor, node_modules, generated files
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/*.pb.go,\
  **/*_test.go,\
  **/migrations/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/dist/**,\
  **/build/**

# Go service
sonar.go.coverage.reportPaths=go-service/coverage.out

# Python service
sonar.python.coverage.reportPaths=python-service/coverage.xml
sonar.python.version=3.12

# Node.js service
sonar.javascript.lcov.reportPaths=node-service/coverage/lcov.info

# Quality Gate thresholds are enforced via SonarQube/SonarCloud UI.

# Encoding
sonar.sourceEncoding=UTF-8
